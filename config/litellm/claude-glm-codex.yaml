# LiteLLM model aliases for the local claude-glm-codex wrapper.
# Secrets are read from the existing claude-glm env file by the launcher and
# exported as CLAUDE_GLM_UPSTREAM_* variables before LiteLLM starts.

model_list:
  - model_name: glm-codex-hybrid
    litellm_params:
      model: os.environ/CLAUDE_GLM_UPSTREAM_OPUS_MODEL
      api_base: os.environ/CLAUDE_GLM_UPSTREAM_BASE_URL
      auth_token: os.environ/CLAUDE_GLM_UPSTREAM_AUTH_TOKEN
    model_info:
      mode: anthropic
      max_input_tokens: 1000000

  - model_name: fable
    litellm_params:
      model: os.environ/CLAUDE_GLM_UPSTREAM_OPUS_MODEL
      api_base: os.environ/CLAUDE_GLM_UPSTREAM_BASE_URL
      auth_token: os.environ/CLAUDE_GLM_UPSTREAM_AUTH_TOKEN
    model_info:
      mode: anthropic
      max_input_tokens: 1000000
      hidden: true
      compatibility_alias_for: glm-codex-hybrid

  - model_name: claude-fable-5
    litellm_params:
      model: os.environ/CLAUDE_GLM_UPSTREAM_OPUS_MODEL
      api_base: os.environ/CLAUDE_GLM_UPSTREAM_BASE_URL
